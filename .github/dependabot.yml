version: 2
multi-ecosystem-groups:
  app-dependencies:
    schedule:
      interval: "weekly"
      time: "06:00"
      day: "monday"
      timezone: "America/Detroit"
    labels:
      - "dependencies"
    commit-message:
      prefix: "update-dependencies: "
    open-pull-requests-limit: 5
  container-updates:
    schedule:
      interval: "cron"
      cronjob: "0 6 3 1 *" #January 3 at 6AM
      timezone: "America/Detroit"
    commit-message:
      prefix: "Annual container update: "
updates:
  # For GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "app-dependencies"
    patterns: ["*"]
  # For Poetry/Python
  - package-ecosystem: "pip"
    directory: "/"
    multi-ecosystem-group: "app-dependencies"
    patterns: ["*"]
  # For Docker
  - package-ecosystem: "docker"
    directory: "/"
    multi-ecosystem-group: "container-updates"
    patterns: ["*"]
  # For Docker Compose
  - package-ecosystem: "docker-compose"
    directory: "/"
    multi-ecosystem-group: "container-updates"
    patterns: ["*"]
